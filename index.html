<body class="bg-stone-50 text-stone-900 font-sans selection:bg-amber-200">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useMemo } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      BookOpen, Play, Video, MessageSquare, Settings, 
      Edit, Trash2, Plus, ChevronLeft, ChevronRight, LogIn, LogOut, 
      Save, X, Headphones, List, Mic, StopCircle, Upload, 
      Loader2, Wand2, CheckCircle, AlertCircle, Info, 
      ExternalLink, Link as LinkIcon, Search, Filter, Star,
      Share2, Copy, Facebook, Instagram
    } from 'https://esm.sh/lucide-react@0.263.1';
    
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { 
      getAuth, signInAnonymously, onAuthStateChanged 
    } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { 
      getFirestore, collection, doc, setDoc, getDoc, 
      onSnapshot, addDoc, updateDoc, deleteDoc 
    } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
    import { 
      getStorage, ref, uploadBytesResumable, getDownloadURL 
    } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js';

    // ==========================================
    // ⚠️ FIREBASE CONFIGURATION (FORCED TO YOUR DB)
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyD04OYHpuCO6Z0ORy8NHMObQE5Bt-pZRnA",
      authDomain: "meri-pasand-2a498.firebaseapp.com",
      projectId: "meri-pasand-2a498",
      storageBucket: "meri-pasand-2a498.firebasestorage.app",
      messagingSenderId: "351274251886",
      appId: "1:351274251886:web:c352f75848ff8a5141587f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let storage;
    try {
      storage = getStorage(app);
    } catch(e) { console.warn("Firebase storage not available", e); }

    // ==========================================
    // ⚠️ SETTINGS & AUTHOR INFO
    // ==========================================
    const apiKey = ""; // ⚠️ CANVAS PREVIEW KE LIYE ISE KHALI ("") RAKHNA ZAROORI HAI. Netlify par live karte waqt yahan apni key paste karein.
    const getModelName = () => "gemini-2.5-flash-preview-09-2025";
    const AUTHOR_NAME = "Sandeep Dhingra"; 

    // API Retry Logic for preventing Rate Limits/Crashes
    const fetchWithRetry = async (url, options) => {
      const delays = [1000, 2000, 4000, 8000, 16000];
      for (let i = 0; i < delays.length + 1; i++) {
        try {
          const res = await fetch(url, options);
          if (!res.ok) throw new Error('API Error');
          return await res.json();
        } catch (err) {
          if (i === delays.length) throw err;
          await new Promise(r => setTimeout(r, delays[i]));
        }
      }
    };

    // --- AI Helpers ---
    const transliterateText = async (text, target) => {
      if (!text.trim()) return '';
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${getModelName()}:generateContent?key=${apiKey}`;
      const prompt = target === 'roman'
        ? `Transliterate the following Hindi text into Roman (Hinglish) script. Return ONLY the text:\n${text}`
        : `Transliterate the following Roman (Hinglish) text into Hindi (Devanagari). Return ONLY the text:\n${text}`;
      try {
        const response = await fetchWithRetry(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) });
        return response.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
      } catch (e) { return ''; }
    };

    const extractUrduVocabulary = async (text) => {
      if (!text.trim()) return '';
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${getModelName()}:generateContent?key=${apiKey}`;
      const prompt = `Extract difficult Urdu words. Format: Word (Devanagari) - Hindi Meaning - English Meaning. Poem:\n${text}`;
      try {
        const response = await fetchWithRetry(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) });
        return response.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
      } catch (e) { return ''; }
    };

    const extractPoemEssence = async (text) => {
      if (!text.trim()) return '';
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${getModelName()}:generateContent?key=${apiKey}`;
      const prompt = `Provide essence of this poem in 2 paragraphs. DO NOT mention the poet's name. Text:\n${text}`;
      try {
        const response = await fetchWithRetry(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) });
        return response.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
      } catch (e) { return ''; }
    };

    const classifyPoem = async (text) => {
      if (!text.trim()) return '';
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${getModelName()}:generateContent?key=${apiKey}`;
      const prompt = `Classify poetic form (Ghazal, Nazm, Sher, Kavita, Doha, Rubai, Geet). Return ONLY the word. Text:\n${text}`;
      try {
        const response = await fetchWithRetry(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) });
        return response.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
      } catch (e) { return ''; }
    };

    const transcribeAudio = async (base64Data, mimeType) => {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${getModelName()}:generateContent?key=${apiKey}`;
      const base64Clean = base64Data.split(',')[1];
      const prompt = "Transcribe this Hindi audio into poetic Hindi (Devanagari). Return only the text.";
      try {
        const response = await fetchWithRetry(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType, data: base64Clean } }] }] }) });
        return response.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
      } catch (e) { return ''; }
    };

    const getYouTubeEmbedUrl = (url) => {
      if (!url) return '';
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=|\/shorts\/)([^#&?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? `https://www.youtube.com/embed/${match[2]}` : url;
    };

    // Helper function to show both Roman and Hindi beautifully
    const formatLabel = (roman, hindi) => {
      const r = (roman || '').trim();
      const h = (hindi || '').trim();
      if (r && h && r !== h) return `${r} / ${h}`;
      return r || h || 'Unknown';
    };

    // --- REUSABLE UI COMPONENTS (MOVED OUTSIDE APP TO FIX FOCUS/STATE LOSS) ---

    const MediaRenderer = ({ url }) => {
      const [isPlaying, setIsPlaying] = useState(false);
      const audioRef = useRef(null);

      if (!url) return null;
      const ytUrl = getYouTubeEmbedUrl(url);
      if (ytUrl !== url) return <iframe src={ytUrl} className="w-full aspect-video rounded-[1.5rem] border-0 shadow-lg" allowFullScreen></iframe>;
      
      const isAudio = url.match(/\.(mp3|wav|m4a|aac|ogg|webm|mp4)(\?.*)?$/i) || url.startsWith('data:audio') || url.includes('rec_');
      
      if (isAudio) {
        const togglePlay = () => {
          if (audioRef.current) {
            if (isPlaying) {
              audioRef.current.pause();
            } else {
              audioRef.current.play();
            }
          }
        };

        return (
          <div className="flex flex-col items-center justify-center mt-2 mb-2">
            <audio 
                ref={audioRef} 
                src={url} 
                onEnded={() => setIsPlaying(false)} 
                onPause={() => setIsPlaying(false)} 
                onPlay={() => setIsPlaying(true)} 
                className="hidden" 
            />
            <button 
              onClick={togglePlay}
              className="flex items-center justify-center gap-3 md:gap-4 bg-amber-500 hover:bg-amber-600 text-white px-8 py-4 md:px-12 md:py-5 rounded-full shadow-[0_10px_40px_-10px_rgba(245,158,11,0.6)] hover:shadow-[0_10px_40px_-5px_rgba(245,158,11,0.8)] hover:-translate-y-1 transition-all duration-300 group"
            >
              {isPlaying ? (
                <>
                    <div className="w-5 h-5 flex justify-between items-center shrink-0">
                       <div className="w-1.5 h-full bg-white rounded-full animate-pulse"></div>
                       <div className="w-1.5 h-full bg-white rounded-full animate-pulse delay-75"></div>
                    </div>
                    <span className="font-black uppercase tracking-[0.2em] text-sm md:text-base whitespace-nowrap">Pause Audio</span>
                </>
              ) : (
                <>
                    <Play className="w-6 h-6 md:w-8 md:h-8 fill-white shrink-0 group-hover:scale-110 transition-transform" />
                    <span className="font-black uppercase tracking-[0.2em] text-sm md:text-base whitespace-nowrap">Play Recitation</span>
                </>
              )}
            </button>
          </div>
        );
      }
      return <video controls className="w-full aspect-video rounded-2xl bg-black mt-4" src={url} />;
    };

    const Header = ({ goHome, isAdmin, setView, view, setShowAdminLogin }) => (
      <header className="bg-stone-900 text-stone-100 sticky top-0 z-20 p-4 shadow-lg">
        <div className="max-w-7xl mx-auto flex justify-between items-center">
          <div className="flex items-center gap-3 cursor-pointer" onClick={goHome}>
            <div className="bg-amber-500 p-2 rounded-xl text-stone-900"><Headphones className="w-6 h-6" /></div>
            <h1 className="text-xl font-serif font-bold hidden sm:flex items-center gap-2">
              <span>Meri Pasand</span><span className="text-stone-500">|</span><span className="text-amber-500">मेरी पसंद</span>
            </h1>
          </div>
          {isAdmin ? (
            <button onClick={() => setView(view === 'admin' ? 'home' : 'admin')} className="bg-stone-800 px-5 py-2 rounded-full text-xs font-bold uppercase tracking-widest flex items-center gap-2 hover:bg-stone-700 transition">
              {view === 'admin' ? <List className="w-4 h-4" /> : <Settings className="w-4 h-4" />}
              {view === 'admin' ? 'Library' : 'Dashboard'}
            </button>
          ) : (
            <button onClick={() => setShowAdminLogin(true)} className="text-stone-400 hover:text-amber-500 transition text-xs font-bold uppercase tracking-widest flex items-center gap-2">
              <LogIn className="w-4 h-4" /> Author
            </button>
          )}
        </div>
      </header>
    );

    const ShareModal = ({ sharePoem, setSharePoem }) => {
      const [message, setMessage] = useState('');

      if (!sharePoem) return null;
      const url = `${window.location.origin}${window.location.pathname}?poem=${sharePoem.id}`;
      const title = sharePoem.titleHindi || sharePoem.title;
      const copyToClipboard = (text, customMsg) => {
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(() => showMessage(customMsg || 'Link copied to clipboard!'));
        } else {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); showMessage(customMsg || 'Link copied!'); } catch (err) {}
            document.body.removeChild(textArea);
        }
      };

      const showMessage = (msg) => {
        setMessage(msg);
        setTimeout(() => setMessage(''), 3000);
      };

      return (
        <div className="fixed inset-0 bg-stone-900/80 backdrop-blur-sm flex items-center justify-center p-6 z-50 animate-in fade-in">
          <div className="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-sm relative">
            <button onClick={() => setSharePoem(null)} className="absolute top-4 right-4 p-2 text-stone-400 hover:bg-stone-100 rounded-full transition"><X className="w-5 h-5"/></button>
            <h3 className="text-2xl font-black text-stone-800 mb-6">Share Poem</h3>
            
            {message && <div className="mb-4 p-3 bg-amber-50 text-amber-700 font-bold text-sm rounded-xl text-center animate-in fade-in">{message}</div>}

            <div className="flex flex-col gap-3">
              <button onClick={() => copyToClipboard(url)} className="flex items-center gap-3 bg-stone-100 p-4 rounded-xl font-bold text-stone-700 hover:bg-stone-200 transition"><Copy className="w-5 h-5 text-stone-500" /> Copy Direct Link</button>
              <a href={`https://wa.me/?text=${encodeURIComponent(`Listen to "${title}" recited by ${AUTHOR_NAME}:\n\n${url}`)}`} target="_blank" rel="noreferrer" className="flex items-center gap-3 bg-[#e8fbf0] p-4 rounded-xl font-bold text-[#075e54] hover:bg-[#dcf8e8] transition"><MessageSquare className="w-5 h-5 text-[#25d366]" /> WhatsApp</a>
              <a href={`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`} target="_blank" rel="noreferrer" className="flex items-center gap-3 bg-blue-50 p-4 rounded-xl font-bold text-blue-700 hover:bg-blue-100 transition"><Facebook className="w-5 h-5 text-blue-600" /> Facebook</a>
              <button onClick={() => copyToClipboard(url, "Link copied! Paste it in your Instagram story or bio.")} className="flex items-center gap-3 bg-pink-50 p-4 rounded-xl font-bold text-pink-700 hover:bg-pink-100 transition text-left"><Instagram className="w-5 h-5 text-pink-600" /> Instagram</button>
            </div>
          </div>
        </div>
      );
    };

    const HomeView = ({ poems, goToDetail, setSharePoem }) => {
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedPoet, setSelectedPoet] = useState('All');
      const [selectedType, setSelectedType] = useState('All');
      const randomOrderRef = useRef({});

      const { uniquePoets, poetLabelMap } = useMemo(() => {
        const map = new Map();
        const labelMap = new Map();
        const getKey = (r, h) => (r || h || '').trim().toLowerCase();

        poems.forEach(p => { 
          const key = getKey(p.poet, p.poetHindi);
          if (!key) return;
          const newLabel = formatLabel(p.poet, p.poetHindi);
          const currentLabel = map.get(key);
          // Prefer bilingual label, or longer label if both are monolingual
          if (!currentLabel || (newLabel.includes('/') && !currentLabel.includes('/')) || (!currentLabel.includes('/') && newLabel.length > currentLabel.length)) {
             map.set(key, newLabel);
          }
        });

        poems.forEach(p => {
          const key = getKey(p.poet, p.poetHindi);
          if (key) labelMap.set(p.id, map.get(key));
        });

        return { uniquePoets: ['All', ...Array.from(map.values()).sort()], poetLabelMap: labelMap };
      }, [poems]);

      const { uniqueTypes, typeLabelMap } = useMemo(() => {
        const map = new Map();
        const labelMap = new Map();
        const getKey = (r, h) => (r || h || '').trim().toLowerCase();

        poems.forEach(p => { 
          const key = getKey(p.classification, p.classificationHindi);
          if (!key) return;
          const newLabel = formatLabel(p.classification, p.classificationHindi);
          const currentLabel = map.get(key);
          if (!currentLabel || (newLabel.includes('/') && !currentLabel.includes('/')) || (!currentLabel.includes('/') && newLabel.length > currentLabel.length)) {
             map.set(key, newLabel);
          }
        });

        poems.forEach(p => {
          const key = getKey(p.classification, p.classificationHindi);
          if (key) labelMap.set(p.id, map.get(key));
        });

        return { uniqueTypes: ['All', ...Array.from(map.values()).sort()], typeLabelMap: labelMap };
      }, [poems]);

      const filteredPoems = useMemo(() => {
        // Assign a stable random seed to each poem for this session to randomize the grid
        poems.forEach(p => {
            if (randomOrderRef.current[p.id] === undefined) {
                randomOrderRef.current[p.id] = Math.random();
            }
        });

        return poems.filter(p => {
          const poetLabel = poetLabelMap.get(p.id) || 'Unknown';
          const matchesPoet = selectedPoet === 'All' || poetLabel === selectedPoet;
          
          const typeLabel = typeLabelMap.get(p.id) || 'Unknown';
          const matchesType = selectedType === 'All' || typeLabel === selectedType;
          
          const q = searchQuery.toLowerCase();
          const matchesSearch = !q || 
            (p.title || '').toLowerCase().includes(q) || 
            (p.titleHindi || '').toLowerCase().includes(q) || 
            (p.poet || '').toLowerCase().includes(q) || 
            (p.poetHindi || '').toLowerCase().includes(q) || 
            (p.hindiText || '').toLowerCase().includes(q) || 
            (p.romanText || '').toLowerCase().includes(q) ||
            (p.classification || '').toLowerCase().includes(q) ||
            (p.classificationHindi || '').toLowerCase().includes(q);

          return matchesPoet && matchesType && matchesSearch;
        }).sort((a, b) => randomOrderRef.current[a.id] - randomOrderRef.current[b.id]);
      }, [poems, searchQuery, selectedPoet, selectedType, poetLabelMap, typeLabelMap]);

      return (
        <div className="max-w-7xl mx-auto p-4 md:p-8">
          <div className="text-center mb-10 mt-6 md:mt-12">
             <h2 className="text-4xl md:text-[54px] font-serif font-black text-stone-800 leading-tight">मेरी पसंद <span className="text-stone-300">|</span> <span className="text-amber-600">मेरी आवाज़ में</span></h2>
             <div className="inline-block mt-8 relative group cursor-default">
                <img 
                   src="https://firebasestorage.googleapis.com/v0/b/meri-pasand-2a498.firebasestorage.app/o/Gemini_Generated_Image_98uz8k98uz8k98uz.png?alt=media" 
                   alt={`Recitations by ${AUTHOR_NAME}`} 
                   onError={(e) => { e.target.onerror = null; e.target.src = 'https://ui-avatars.com/api/?name=Sandeep+Dhingra&background=f59e0b&color=fff&size=256'; }}
                   className="w-48 h-48 md:w-56 md:h-56 object-cover rounded-[3rem] transform group-hover:-translate-y-2 transition duration-500 bg-stone-200" 
                />
                <div className="absolute -bottom-5 left-1/2 transform -translate-x-1/2 bg-stone-900 px-6 py-2.5 rounded-full shadow-xl flex items-center gap-2 whitespace-nowrap">
                   <Mic className="w-4 h-4 text-amber-500 animate-pulse" />
                   <span className="text-xs font-black text-amber-400 uppercase tracking-[0.2em]">Recitations by {AUTHOR_NAME}</span>
                </div>
             </div>
          </div>
          
          <div className="bg-white p-4 md:p-6 rounded-[2rem] shadow-lg border border-stone-200 mb-10 sticky top-[76px] z-10 flex flex-col gap-4">
             <div className="flex items-center relative">
                <Search className="absolute left-4 w-5 h-5 text-stone-400" />
                <input type="text" placeholder="Search poems, poets, or words..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full bg-stone-50 border border-stone-200 py-4 pl-12 pr-12 rounded-full outline-none focus:ring-2 focus:ring-amber-500 font-medium" />
                {searchQuery && <button onClick={() => setSearchQuery('')} className="absolute right-4 text-stone-400 hover:text-stone-600"><X className="w-5 h-5" /></button>}
             </div>

             <div className="flex flex-col sm:flex-row gap-4">
                <div className="flex-1 relative">
                  <div className="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                    <Filter className="w-4 h-4 text-stone-400" />
                  </div>
                  <select value={selectedPoet} onChange={(e) => setSelectedPoet(e.target.value)} className="w-full bg-stone-50 border border-stone-200 py-3 pl-10 pr-10 rounded-xl outline-none focus:ring-2 focus:ring-amber-500 font-medium text-stone-600 appearance-none cursor-pointer">
                    {uniquePoets.map(poet => (
                      <option key={poet} value={poet}>{poet === 'All' ? 'All Poets' : poet}</option>
                    ))}
                  </select>
                  <div className="absolute inset-y-0 right-4 flex items-center pointer-events-none">
                    <ChevronLeft className="w-4 h-4 text-stone-400 -rotate-90" />
                  </div>
                </div>
                
                <div className="flex-1 relative">
                  <div className="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                    <Filter className="w-4 h-4 text-stone-400" />
                  </div>
                  <select value={selectedType} onChange={(e) => setSelectedType(e.target.value)} className="w-full bg-stone-50 border border-stone-200 py-3 pl-10 pr-10 rounded-xl outline-none focus:ring-2 focus:ring-amber-500 font-medium text-stone-600 appearance-none cursor-pointer">
                    {uniqueTypes.map(type => (
                      <option key={type} value={type}>{type === 'All' ? 'All Forms/Types' : type}</option>
                    ))}
                  </select>
                  <div className="absolute inset-y-0 right-4 flex items-center pointer-events-none">
                    <ChevronLeft className="w-4 h-4 text-stone-400 -rotate-90" />
                  </div>
                </div>
             </div>
          </div>

          <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8 mt-12">
            {filteredPoems.map(p => {
               const isAudioOnly = p.mediaUrl && (p.mediaUrl.match(/\.(mp3|wav|m4a|aac|ogg|webm|mp4)(\?.*)?$/i) || p.mediaUrl.startsWith('data:audio'));
               return (
                <div key={p.id} onClick={() => goToDetail(p)} className="bg-white p-6 rounded-[2rem] border border-stone-100 shadow-sm hover:shadow-2xl hover:border-amber-300 hover:-translate-y-2 transition-all duration-300 cursor-pointer group flex flex-col h-full relative overflow-hidden">
                   <div className="absolute top-0 right-0 w-24 h-24 bg-amber-50 rounded-bl-[80px] -mr-8 -mt-8 opacity-50 group-hover:bg-amber-100 transition-colors"></div>
                   <div className="relative z-10 flex-grow mb-4">
                      <h3 className="text-2xl font-serif font-bold text-stone-800 mb-2 group-hover:text-amber-800 transition">
                         {p.titleHindi || p.title}
                         {(p.title && p.titleHindi && p.title !== p.titleHindi) && <span className="text-stone-400 text-lg ml-2 font-sans font-medium block sm:inline">| {p.title}</span>}
                      </h3>
                      <div className="flex flex-wrap gap-2 mt-2">
                        <span className="px-3 py-1 bg-stone-50 border border-stone-100 rounded-lg text-stone-600 font-bold text-[10px] uppercase tracking-widest">By {poetLabelMap.get(p.id) || formatLabel(p.poet, p.poetHindi)}</span>
                        {(p.classification || p.classificationHindi) && <span className="px-3 py-1 bg-amber-50 border border-amber-100 rounded-lg text-amber-700 font-bold text-[10px] uppercase tracking-widest">{typeLabelMap.get(p.id) || formatLabel(p.classification, p.classificationHindi)}</span>}
                      </div>
                   </div>
                   <div className="relative z-10 flex items-center justify-between pt-4 border-t border-stone-100">
                      <button onClick={(e) => {e.stopPropagation(); setSharePoem(p);}} className="p-3 bg-stone-50 border border-stone-100 rounded-full text-stone-400 hover:text-amber-600 hover:border-amber-200 hover:bg-amber-50 transition shadow-sm"><Share2 className="w-4 h-4"/></button>

    const AdminDashboard = ({ poems, user }) => {
      const [editingPoem, setEditingPoem] = useState(null);
      const [formData, setFormData] = useState({});
      const [aiProcessing, setAiProcessing] = useState(false);
      const [uploading, setUploading] = useState(false);
      const [progress, setProgress] = useState(0);
      const [isRecording, setIsRecording] = useState(false);
      const [showLinkInput, setShowLinkInput] = useState(false);
      const [formError, setFormError] = useState('');
      const [audioData, setAudioData] = useState(null);
      const [confirmDeleteId, setConfirmDeleteId] = useState(null);
      const [recordingTime, setRecordingTime] = useState(0);

      const mediaRecorder = useRef(null);
      const timerRef = useRef(null);

      const handleCreate = () => { 
        setEditingPoem({id:'new'}); 
        setFormData({title:'', titleHindi:'', poet:'', poetHindi:'', hindiText:'', romanText:'', vocabulary:'', essence:'', classification:'', classificationHindi:'', mediaUrl:'', rank:poems.length+1}); 
        setFormError(''); setAudioData(null); setShowLinkInput(false);
      };
      
      const handleEdit = (p) => {
        setEditingPoem(p); setFormData({ ...p }); setFormError(''); setAudioData(null); 
        setShowLinkInput(!!(p.mediaUrl && !p.mediaUrl.startsWith('https://firebasestorage')));
      };

      const typingTimeout = useRef(null);

      const auto = async (type, val) => {
        if (!val || !val.trim()) return;
        setAiProcessing(true);
        try {
          if (type === 'title') { const res = await transliterateText(val, 'hindi'); setFormData(p => ({...p, titleHindi: res})); }
          if (type === 'poet') { const res = await transliterateText(val, 'hindi'); setFormData(p => ({...p, poetHindi: p.poetHindi ? p.poetHindi : res})); }
          if (type === 'poetHindi') { const res = await transliterateText(val, 'roman'); setFormData(p => ({...p, poet: p.poet ? p.poet : res})); }
          if (type === 'essence') { const res = await extractPoemEssence(val); setFormData(p => ({...p, essence: res})); }
          if (type === 'vocab') { const res = await extractUrduVocabulary(val); setFormData(p => ({...p, vocabulary: res})); }
          if (type === 'class') { 
            const res = await classifyPoem(val); 
            setFormData(p => ({...p, classification: res}));
            const resHindi = await transliterateText(res, 'hindi');
            setFormData(p => ({...p, classificationHindi: p.classificationHindi ? p.classificationHindi : resHindi}));
          }
          if (type === 'classRoman') { const res = await transliterateText(val, 'hindi'); setFormData(p => ({...p, classificationHindi: p.classificationHindi ? p.classificationHindi : res})); }
          if (type === 'classHindi') { const res = await transliterateText(val, 'roman'); setFormData(p => ({...p, classification: p.classification ? p.classification : res})); }
          if (type === 'roman') { const res = await transliterateText(val, 'roman'); setFormData(p => ({...p, romanText: res})); }
          if (type === 'hindi') { const res = await transliterateText(val, 'hindi'); setFormData(p => ({...p, hindiText: res})); }
        } catch(e) { console.error(e); }
        setAiProcessing(false);
      };

      const handleDebouncedAuto = (type, val) => {
        if (typingTimeout.current) clearTimeout(typingTimeout.current);
        typingTimeout.current = setTimeout(() => auto(type, val), 2000);
      };

      const blobToBase64 = (blob) => new Promise(resolve => {
        const r = new FileReader(); r.onloadend = () => resolve(r.result); r.readAsDataURL(blob);
      });

      const handleFile = async (e) => {
        const file = e.target.files[0];
        if (!file || !user) return;
        setUploading(true); setFormError(''); setShowLinkInput(false);
        const b64 = await blobToBase64(file);
        
        // Mobile browsers might output video/mp4 when recording audio natively.
        setAudioData({ base64: b64, mimeType: file.type || 'audio/mp3' });

        if (storage) {
          const safeName = file.name ? file.name.replace(/\s+/g, '_') : 'native_recording.mp4';
          const fileName = `${Date.now()}_${safeName}`;
          const path = `poetry_media/${fileName}`;
          const sRef = ref(storage, path);
          const task = uploadBytesResumable(sRef, file);
          task.on('state_changed', 
            (s) => setProgress(Math.round((s.bytesTransferred / s.totalBytes) * 100)),
            (err) => { setFormError(`Upload failed: ${err.message}`); setUploading(false); },
            async () => { const url = await getDownloadURL(task.snapshot.ref); setFormData(prev => ({ ...prev, mediaUrl: url })); setUploading(false); setProgress(0); }
          );
        } else { setFormError("Storage config missing."); setUploading(false); }
        
        // Reset the input value so the same file can be triggered again if needed
        e.target.value = '';
      };

      const startRecording = async () => {
        try {
          setFormError('');
          setShowLinkInput(false);
          
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            throw new Error("Microphone API is not supported in this browser.");
          }

          const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
          
          mediaRecorder.current = new MediaRecorder(stream);
          const chunks = [];
          
          mediaRecorder.current.ondataavailable = (e) => {
            if (e.data && e.data.size > 0) chunks.push(e.data);
          };
          
          mediaRecorder.current.onstop = async () => {
            clearInterval(timerRef.current);
            setRecordingTime(0);
            
            const mimeType = mediaRecorder.current.mimeType || 'audio/webm';
            const blob = new Blob(chunks, { type: mimeType });
            const b64 = await blobToBase64(blob);
            setAudioData({ base64: b64, mimeType: mimeType });
            
            if (storage && user) {
              setUploading(true);
              const ext = mimeType.includes('mp4') ? 'mp4' : mimeType.includes('ogg') ? 'ogg' : 'webm';
              const path = `poetry_media/rec_${Date.now()}.${ext}`;
              const task = uploadBytesResumable(ref(storage, path), blob);
              task.on('state_changed', 
                (s) => setProgress(Math.round((s.bytesTransferred / s.totalBytes) * 100)), 
                (err) => { setFormError("Upload error: " + err.message); setUploading(false); },
                async () => { const url = await getDownloadURL(task.snapshot.ref); setFormData(p => ({ ...p, mediaUrl: url })); setUploading(false); }
              );
            }
          };
          
          // Request data every second to prevent memory limits on mobile devices
          mediaRecorder.current.start(1000); 
          setIsRecording(true);
          setRecordingTime(0);
          timerRef.current = setInterval(() => {
             setRecordingTime(prev => prev + 1);
          }, 1000);
          
        } catch(e) { 
          console.error("Mic error details:", e);
          let errorMsg = e.message;
          if (e.name === 'NotAllowedError' || e.message.includes('Permission denied')) {
             errorMsg = "Permission denied. Please click the lock icon in your browser's URL bar and allow microphone access.";
          } else if (e.name === 'NotFoundError') {
             errorMsg = "No microphone found on this device.";
          }
          setFormError("Microphone error: " + errorMsg); 
        }
      };

      const stopRecording = () => { 
        if (mediaRecorder.current) { 
          mediaRecorder.current.stop(); 
          setIsRecording(false); 
          clearInterval(timerRef.current);
          // Explicitly stop all tracks to release the microphone
          if (mediaRecorder.current.stream) {
              mediaRecorder.current.stream.getTracks().forEach(track => track.stop());
          }
        } 
      };

      const handleTranscribe = async () => {
        if (!audioData) return setFormError("Upload or record audio first.");
        setFormError(''); setAiProcessing(true);
        const text = await transcribeAudio(audioData.base64, audioData.mimeType);
        if (text) {
          setFormData(p => ({ ...p, hindiText: text }));
          const roman = await transliterateText(text, 'roman');
          const vocab = await extractUrduVocabulary(text);
          const essence = await extractPoemEssence(text);
          const classification = await classifyPoem(text);
          setFormData(prev => ({ ...prev, romanText: roman, vocabulary: vocab, essence: essence, classification: classification }));
        } else { setFormError("Could not transcribe."); }
        setAiProcessing(false);
      };

      const save = async (e) => {
        e.preventDefault();
        const col = collection(db, 'poems');
        if (editingPoem.id === 'new') await addDoc(col, {...formData, createdAt: Date.now()});
        else await updateDoc(doc(db, 'poems', editingPoem.id), {...formData, updatedAt: Date.now()});
        setEditingPoem(null);
      };

      const deletePoem = async (id) => {
        if (confirmDeleteId === id) {
          await deleteDoc(doc(db, 'poems', id));
          setConfirmDeleteId(null);
        } else {
          setConfirmDeleteId(id);
          setTimeout(() => setConfirmDeleteId(null), 3000);
        }
      };

      return (
        <div className="max-w-7xl mx-auto p-4 md:p-8">
          <div className={`mb-8 p-4 rounded-2xl flex items-center justify-between border shadow-sm ${user ? 'bg-green-50 text-green-700 border-green-100' : 'bg-red-50 text-red-700 border-red-100'}`}>
            <div className="flex items-center gap-3 text-sm font-black tracking-widest uppercase">
              {user ? <CheckCircle className="w-5 h-5" /> : <AlertCircle className="w-5 h-5" />}
              {user ? `Database Connected: ${user.uid.substring(0,8)}` : 'Waiting for Authentication...'}
            </div>
          </div>

          <div className="flex flex-col md:flex-row md:justify-between md:items-center gap-6 mb-10">
            <h2 className="text-4xl font-serif font-black text-stone-800">Admin Dashboard</h2>
            {!editingPoem && <button onClick={handleCreate} className="bg-amber-600 text-white px-8 py-4 rounded-full font-bold shadow-xl hover:-translate-y-1 transition flex items-center gap-2 uppercase tracking-widest text-xs"><Plus className="w-4 h-4" /> Add New</button>}
          </div>
          
          {editingPoem ? (
            <div className="bg-white p-6 md:p-12 rounded-[2.5rem] shadow-2xl relative border border-stone-200">
              {aiProcessing && <div className="absolute inset-0 bg-white/80 z-20 flex flex-col items-center justify-center backdrop-blur-sm rounded-[2.5rem]"><Loader2 className="animate-spin w-12 h-12 text-amber-600 mb-4" /><p className="font-bold text-amber-600 tracking-widest uppercase text-xs">AI is working...</p></div>}
              
              <div className="flex justify-between items-center mb-8 border-b pb-4">
                <h3 className="font-black text-2xl">{editingPoem.id === 'new' ? 'New Composition' : 'Edit Composition'}</h3>
                <button onClick={() => setEditingPoem(null)} className="p-2 bg-stone-100 rounded-full hover:bg-stone-200 transition"><X className="w-5 h-5 text-stone-500" /></button>
              </div>
              
              {formError && <div className="bg-red-50 text-red-600 p-4 rounded-xl mb-6 text-sm border border-red-200 font-bold flex items-center gap-2"><AlertCircle className="w-5 h-5"/> {formError}</div>}

              <form onSubmit={save} className="space-y-8">
                <div className="grid md:grid-cols-2 gap-6">
                  <div className="space-y-2">
                     <label className="text-[10px] font-black uppercase text-stone-400 block ml-1">Title (Roman) to Auto Hindi</label>
                     <input value={formData.title || ''} onChange={e => { const val = e.target.value; setFormData({...formData, title: val}); handleDebouncedAuto('title', val); }} placeholder="Type Title (Roman)..." className="w-full border-b-2 p-3 outline-none focus:border-amber-500 transition" />
                     <input value={formData.titleHindi || ''} onChange={e => setFormData({...formData, titleHindi: e.target.value})} placeholder="शीर्षक (Hindi)..." className="w-full border-b-2 p-3 outline-none bg-stone-50 font-serif text-lg rounded-t-lg" />
                  </div>
                  <div className="space-y-2">
                     <label className="text-[10px] font-black uppercase text-stone-400 block ml-1">Poet (Roman) to Auto Hindi</label>
                     <input value={formData.poet || ''} onChange={e => { const val = e.target.value; setFormData({...formData, poet: val}); handleDebouncedAuto('poet', val); }} placeholder="Type Poet (Roman)..." className="w-full border-b-2 p-3 outline-none focus:border-amber-500 transition" />
                     <input value={formData.poetHindi || ''} onChange={e => setFormData({...formData, poetHindi: e.target.value})} placeholder="कवि (Hindi)..." className="w-full border-b-2 p-3 outline-none bg-stone-50 font-serif rounded-t-lg" />
                  </div>
                </div>

                {/* Media Section */}
                <div className="bg-stone-50 p-6 md:p-8 rounded-3xl border border-stone-200">
                  <label className="block text-[10px] font-black uppercase text-stone-500 mb-6 tracking-widest">Audio & Media</label>
                  <div className="flex flex-wrap gap-3 mb-6">
                    <button type="button" onClick={isRecording ? stopRecording : startRecording} className={`flex items-center gap-2 px-6 py-3 rounded-full font-black shadow-md transition text-xs uppercase tracking-widest ${isRecording ? 'bg-red-600 text-white animate-pulse' : 'bg-stone-900 text-white hover:bg-stone-800'}`}>
                      {isRecording ? <StopCircle className="w-4 h-4" /> : <Mic className="w-4 h-4" />} 
                      {isRecording ? `Stop Recording (${Math.floor(recordingTime/60)}:${(recordingTime%60).toString().padStart(2, '0')})` : 'Record Audio'}
                    </button>
                    <label className="flex items-center gap-2 px-5 py-3 bg-white border border-stone-200 rounded-full cursor-pointer hover:border-amber-400 transition shadow-sm font-black text-stone-600 text-xs uppercase tracking-widest">
                      <Upload className="w-4 h-4" /> Upload File
                      <input type="file" accept="audio/*,video/mp4,video/quicktime" onChange={handleFile} className="hidden" />
                    </label>
                    <button type="button" onClick={() => setShowLinkInput(!showLinkInput)} className={`flex items-center gap-2 px-5 py-3 border rounded-full cursor-pointer transition shadow-sm font-black text-xs uppercase tracking-widest ${showLinkInput ? 'bg-amber-50 border-amber-300 text-amber-700' : 'bg-white border-stone-200 text-stone-600 hover:border-amber-400'}`}>
                      <LinkIcon className="w-4 h-4" /> Paste Link
                    </button>
                  </div>
                  {showLinkInput && (
                    <input type="url" placeholder="https://youtube.com/..." value={formData.mediaUrl || ''} onChange={(e) => { setFormData(prev => ({ ...prev, mediaUrl: e.target.value })); setAudioData(null); }} className="w-full border p-3 rounded-xl outline-none focus:border-amber-500 mb-4" />
                  )}
                  {uploading && <div className="mb-4"><div className="flex justify-between text-xs font-bold text-amber-600 mb-1"><span>Uploading...</span><span>{progress}%</span></div><div className="h-2 bg-stone-200 rounded-full overflow-hidden"><div className="h-full bg-amber-500 transition-all" style={{width: `${progress}%`}}></div></div></div>}
                  {formData.mediaUrl && (
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-100 flex flex-col gap-4">
                      <MediaRenderer url={formData.mediaUrl} />
                      <div className="flex flex-wrap gap-3">
                        <button type="button" onClick={handleTranscribe} disabled={aiProcessing || !audioData} className="bg-amber-100 text-amber-900 px-4 py-2 rounded-full flex items-center gap-2 text-xs font-black uppercase tracking-widest hover:bg-amber-200 transition disabled:opacity-50">
                          {aiProcessing ? <Loader2 className="w-4 h-4 animate-spin" /> : <Wand2 className="w-4 h-4" />} Auto-Transcribe Audio
                        </button>
                        <button type="button" onClick={() => { setFormData(p => ({...p, mediaUrl: ''})); setAudioData(null); }} className="text-red-500 hover:bg-red-50 px-4 py-2 rounded-full text-xs font-bold transition">Remove Media</button>
                      </div>
                    </div>
                  )}
                </div>

                <div className="grid md:grid-cols-2 gap-6">
                  <div className="space-y-2">
                     <label className="text-[10px] font-black uppercase text-amber-600 tracking-widest ml-1">Hindi Text</label>
                     <textarea rows="8" value={formData.hindiText || ''} onChange={e => { const val = e.target.value; setFormData({...formData, hindiText: val}); handleDebouncedAuto('roman', val); }} placeholder="Hindi Text (Auto-generates Roman)..." className="w-full border p-6 rounded-2xl font-serif text-xl outline-none focus:border-amber-500 transition" />
                  </div>
                  <div className="space-y-2">
                     <label className="text-[10px] font-black uppercase text-stone-400 tracking-widest ml-1">Roman Transliteration</label>
                     <textarea rows="8" value={formData.romanText || ''} onChange={e => { const val = e.target.value; setFormData({...formData, romanText: val}); handleDebouncedAuto('hindi', val); }} placeholder="Roman Text (Auto-generates Hindi)..." className="w-full border p-6 rounded-2xl font-serif text-xl italic bg-stone-50 outline-none focus:border-stone-400 transition" />
                  </div>
                </div>

                <div className="grid md:grid-cols-2 gap-6">
                  <div className="space-y-2">
                     <div className="flex justify-between"><label className="text-[10px] font-black uppercase text-stone-400 tracking-widest">Essence & Meaning</label> <button type="button" onClick={() => auto('essence', formData.hindiText)} className="text-[10px] font-bold bg-amber-50 text-amber-700 px-3 py-1 rounded-full uppercase tracking-widest">Auto Generate</button></div>
                     <textarea rows="4" value={formData.essence || ''} onChange={e => setFormData({...formData, essence: e.target.value})} placeholder="Summary..." className="w-full border p-5 rounded-2xl text-sm outline-none focus:border-amber-500" />
                  </div>
                  <div className="space-y-2">
                     <div className="flex justify-between"><label className="text-[10px] font-black uppercase text-stone-400 tracking-widest">Urdu Glossary</label> <button type="button" onClick={() => auto('vocab', formData.hindiText)} className="text-[10px] font-bold bg-amber-50 text-amber-700 px-3 py-1 rounded-full uppercase tracking-widest">Auto Extract</button></div>
                     <textarea rows="4" value={formData.vocabulary || ''} onChange={e => setFormData({...formData, vocabulary: e.target.value})} placeholder="Word - Meaning..." className="w-full border p-5 rounded-2xl text-sm outline-none focus:border-amber-500" />
                  </div>
                </div>

                <div className="grid md:grid-cols-2 gap-6">
                  <div className="space-y-2">
                     <div className="flex justify-between"><label className="text-[10px] font-black uppercase text-stone-400 tracking-widest">Classification (Roman ⇄ Hindi)</label> <button type="button" onClick={() => auto('class', formData.hindiText)} className="text-[10px] font-bold bg-amber-50 text-amber-700 px-3 py-1 rounded-full uppercase tracking-widest">Auto Detect</button></div>
                     <input value={formData.classification || ''} onChange={e => { const val = e.target.value; setFormData({...formData, classification: val}); handleDebouncedAuto('classRoman', val); }} placeholder="e.g. Ghazal (Roman)..." className="w-full border-b-2 p-3 outline-none focus:border-amber-500 transition" />
                     <input value={formData.classificationHindi || ''} onChange={e => { const val = e.target.value; setFormData({...formData, classificationHindi: val}); handleDebouncedAuto('classHindi', val); }} placeholder="उदा. ग़ज़ल (Hindi)..." className="w-full border-b-2 p-3 outline-none bg-stone-50 font-serif rounded-t-lg mt-2" />
                  </div>
                  <div className="space-y-2">
                     <label className="text-[10px] font-black uppercase text-stone-400 tracking-widest block ml-1">Sort Rank</label>
                     <input type="number" placeholder="Rank (e.g. 1)" value={formData.rank || ''} onChange={e => setFormData({...formData, rank: e.target.value})} className="w-full border-b-2 p-3 outline-none focus:border-amber-500 text-lg" />
                  </div>
                </div>

                <div className="flex gap-4 pt-6 border-t border-stone-100">
                  <button className="flex-grow bg-stone-900 text-white py-5 rounded-2xl font-black uppercase tracking-[0.2em] hover:bg-stone-800 transition shadow-xl hover:-translate-y-1">Publish Composition</button>
                  <button type="button" onClick={() => setEditingPoem(null)} className="bg-stone-100 px-8 py-5 rounded-2xl font-bold uppercase tracking-widest text-stone-500 hover:bg-stone-200 transition">Cancel</button>
                </div>
              </form>
            </div>
          ) : (
            <div className="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-stone-200">
              <div className="overflow-x-auto">
                <table className="w-full text-left">
                  <thead className="bg-stone-50 border-b border-stone-100">
                    <tr className="text-[10px] font-black uppercase text-stone-400 tracking-widest">
                       <th className="p-6">Rank</th><th className="p-6">Composition</th><th className="p-6">Form</th><th className="p-6 text-right">Actions</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-stone-100">
                    {poems.length === 0 ? (
                      <tr><td colSpan="4" className="p-20 text-center text-stone-400 italic font-serif text-xl">No poems found. Add some compositions!</td></tr>
                    ) : poems.map(p => (
                      <tr key={p.id} className="hover:bg-stone-50 transition group">
                        <td className="p-6 font-bold text-stone-400">{p.rank}</td>
                        <td className="p-6">
                           <div className="font-serif font-bold text-xl text-stone-800">
                              {p.titleHindi || p.title} 
                              {p.title && p.titleHindi && p.title !== p.titleHindi && <span className="text-stone-400 text-sm font-sans font-normal ml-2">/ {p.title}</span>}
                           </div>
                           <div className="text-xs font-bold text-stone-400 uppercase tracking-widest mt-1">By {formatLabel(p.poet, p.poetHindi)}</div>
                        </td>
                        <td className="p-6"><span className="text-[10px] font-black bg-amber-50 text-amber-700 px-3 py-1.5 rounded-full uppercase tracking-widest">{formatLabel(p.classification, p.classificationHindi)}</span></td>
                        <td className="p-6 text-right">
                          <div className="flex justify-end gap-2 opacity-50 group-hover:opacity-100 transition-opacity">
                            <button onClick={() => handleEdit(p)} className="p-3 bg-white border border-stone-200 rounded-full hover:text-amber-600 hover:border-amber-300 shadow-sm transition"><Edit className="w-4 h-4"/></button>
                            <button onClick={() => deletePoem(p.id)} className={`p-3 bg-white border rounded-full shadow-sm transition ${confirmDeleteId === p.id ? 'text-red-600 border-red-500 bg-red-50' : 'border-stone-200 hover:text-red-600 hover:border-red-300'}`}>
                              {confirmDeleteId === p.id ? <span className="text-[10px] font-black uppercase px-1">Sure?</span> : <Trash2 className="w-4 h-4"/>}
                            </button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      );
    };

    function App() {
      const [user, setUser] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [view, setView] = useState('home');
      const [poems, setPoems] = useState([]);
      const [selectedPoem, setSelectedPoem] = useState(null);
      const [loading, setLoading] = useState(true);
      const [showAdminLogin, setShowAdminLogin] = useState(false);
      const [adminPassword, setAdminPassword] = useState('');
      const [loginError, setLoginError] = useState('');
      const [sharePoem, setSharePoem] = useState(null);

      useEffect(() => {
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (err) {
            console.error("Auth failed:", err);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, (u) => { setUser(u); setLoading(false); });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        const poemsRef = collection(db, 'poems');
        return onSnapshot(poemsRef, (snap) => {
          const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setPoems(data.sort((a, b) => (a.rank || 0) - (b.rank || 0)));
        }, (err) => console.error("Firestore error:", err));
      }, [user]);

      // Deep Linking
      useEffect(() => {
        if (poems.length > 0 && view === 'home') {
          const params = new URLSearchParams(window.location.search);
          const pid = params.get('poem');
          if (pid) {
            const p = poems.find(x => x.id === pid);
            if (p) { setSelectedPoem(p); setView('detail'); }
          }
        }
      }, [poems]);

      const goHome = () => { setView('home'); setSelectedPoem(null); window.history.pushState({}, '', window.location.pathname); window.scrollTo({ top: 0, behavior: 'smooth' }); };
      const goToDetail = (p) => { setSelectedPoem(p); setView('detail'); window.history.pushState({}, '', `?poem=${p.id}`); window.scrollTo({ top: 0, behavior: 'smooth' }); };

      const handleAdminLogin = (e) => {
        e.preventDefault();
        if (adminPassword === 'kavi123') { setIsAdmin(true); setShowAdminLogin(false); setAdminPassword(''); setView('admin'); }
        else { setLoginError('Incorrect password'); }
      };

      return (
        <div className="min-h-screen bg-stone-50 selection:bg-amber-200">
          {loading ? (
            <div className="h-screen flex flex-col items-center justify-center bg-stone-50 gap-6">
              <div className="w-20 h-20 border-4 border-stone-200 border-t-amber-500 rounded-full animate-spin"></div>
              <p className="font-serif italic text-stone-400 text-xl animate-pulse">Loading Library...</p>
            </div>
          ) : (
            <>
              <Header goHome={goHome} isAdmin={isAdmin} setView={setView} view={view} setShowAdminLogin={setShowAdminLogin} />
              <main className="pb-32">
                {view === 'home' && <HomeView poems={poems} goToDetail={goToDetail} setSharePoem={setSharePoem} />}
                {view === 'detail' && <PoemDetailView selectedPoem={selectedPoem} poems={poems} goHome={goHome} goToDetail={goToDetail} setSharePoem={setSharePoem} user={user} />}
                {view === 'admin' && isAdmin && <AdminDashboard poems={poems} user={user} />}
              </main>
              
              <ShareModal sharePoem={sharePoem} setSharePoem={setSharePoem} />
              
              {showAdminLogin && (
                <div className="fixed inset-0 bg-stone-900/90 backdrop-blur-xl flex items-center justify-center p-6 z-50 animate-in fade-in">
                  <div className="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md text-center border border-stone-200">
                    <h2 className="text-3xl font-black mb-8 uppercase tracking-tight text-stone-800">Author Access</h2>
                    <form onSubmit={handleAdminLogin} className="space-y-6">
                      <input type="password" value={adminPassword} onChange={e => setAdminPassword(e.target.value)} placeholder="Secret Key" className="w-full border-b-4 border-stone-100 p-4 outline-none focus:border-amber-500 text-2xl font-bold text-center transition" autoFocus />
                      {loginError && <p className="text-red-500 text-xs font-black uppercase tracking-widest">{loginError}</p>}
                      <button className="w-full bg-stone-900 text-white py-6 rounded-[1.5rem] font-black uppercase tracking-widest hover:bg-black transition shadow-xl">Enter Library</button>
                    </form>
                    <button onClick={() => setShowAdminLogin(false)} className="mt-8 text-stone-400 hover:text-stone-600 font-bold uppercase text-[10px] tracking-widest transition">Cancel</button>
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
