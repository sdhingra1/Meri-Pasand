<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meri Pasand - Meri Awaaz Me</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-stone-50">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useMemo } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      BookOpen, Play, Video, MessageSquare, Settings, 
      Edit, Trash2, Plus, ChevronLeft, LogIn, LogOut, 
      Save, X, Headphones, List, Mic, StopCircle, Upload, 
      Loader2, Wand2, CheckCircle, AlertCircle, Info, 
      ExternalLink, Link as LinkIcon, Search, Filter, Star 
    } from 'https://esm.sh/lucide-react@0.263.1';
    
    // Updated to official Google gstatic CDN to fix module resolution and auth registration errors
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
    import { getStorage, ref, uploadBytesResumable, getDownloadURL } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js';

    // ==========================================
    // ⚠️ FIREBASE CONFIGURATION (Already Yours)
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyD04OYHpuCO6Z0ORy8NHMObQE5Bt-pZRnA",
      authDomain: "meri-pasand-2a498.firebaseapp.com",
      projectId: "meri-pasand-2a498",
      storageBucket: "meri-pasand-2a498.firebasestorage.app",
      messagingSenderId: "351274251886",
      appId: "1:351274251886:web:c352f75848ff8a5141587f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // ==========================================
    // ⚠️ GEMINI API KEY REQUIRED HERE
    // ==========================================
    // Get a free key from: https://aistudio.google.com/app/apikey
    const apiKey = "AIzaSyBs6FLaXrpHqF7QsY1ocsbP8hru90NR4_4"; 

    // --- AI Helpers ---
    const transliterateText = async (text, target) => {
      if (!text.trim() || apiKey === "PASTE_YOUR_GEMINI_API_KEY_HERE") return '';
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
      const prompt = target === 'roman'
        ? `Transliterate the following Hindi text into Roman (Hinglish) script. Return ONLY the text:\n${text}`
        : `Transliterate the following Roman (Hinglish) text into Hindi (Devanagari). Return ONLY the text:\n${text}`;

      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await response.json();
        return data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
      } catch (e) { return ''; }
    };

    const extractUrduVocabulary = async (text) => {
      if (!text.trim() || apiKey === "PASTE_YOUR_GEMINI_API_KEY_HERE") return '';
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
      const prompt = `Extract difficult Urdu words from this poem. Return a list in this format: Word (Devanagari) - Hindi Meaning - English Meaning. Poem:\n${text}`;

      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await response.json();
        return data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
      } catch (e) { return ''; }
    };

    const transcribeAudio = async (base64Data, mimeType) => {
      if (apiKey === "PASTE_YOUR_GEMINI_API_KEY_HERE") {
        alert("Please add your Gemini API Key in the code to use AI Transcription.");
        return '';
      }
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
      const base64Clean = base64Data.split(',')[1];
      const prompt = "Transcribe this Hindi audio into poetic Hindi (Devanagari). Return only the text.";

      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              parts: [{ text: prompt }, { inlineData: { mimeType: mimeType, data: base64Clean } }]
            }]
          })
        });
        const data = await response.json();
        return data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
      } catch (e) { return ''; }
    };

    // --- Media Embed Helper ---
    const getYouTubeEmbedUrl = (url) => {
      if (!url) return '';
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=|\/shorts\/)([^#&?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? `https://www.youtube.com/embed/${match[2]}` : url;
    };

    const MediaRenderer = ({ url }) => {
      if (!url) return null;
      const ytUrl = getYouTubeEmbedUrl(url);
      
      if (ytUrl !== url) {
        return <iframe src={ytUrl} className="w-full aspect-video rounded-[1.5rem] border-0 shadow-lg" allowFullScreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>;
      }
      
      const isAudio = url.match(/\.(mp3|wav|m4a|aac|ogg|webm)(\?.*)?$/i) || url.startsWith('data:audio');
      const isVideo = url.match(/\.(mp4|mov|mkv)(\?.*)?$/i) || url.startsWith('data:video');

      if (isAudio) {
        return <audio controls className="w-full shadow-sm rounded-full" src={url} />;
      } 
      else if (isVideo) {
        return <video controls className="w-full aspect-video rounded-[1.5rem] shadow-lg bg-black" src={url} />;
      } 
      else {
        return (
          <a href={url} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-3 p-6 bg-stone-100 rounded-[1.5rem] text-amber-700 font-black tracking-widest uppercase text-sm hover:bg-stone-200 transition shadow-sm border border-stone-200">
             <ExternalLink className="w-6 h-6" />
             View Media on External Platform
          </a>
        );
      }
    };

    function App() {
      const [user, setUser] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [view, setView] = useState('home');
      const [poems, setPoems] = useState([]);
      const [selectedPoem, setSelectedPoem] = useState(null);
      const [loading, setLoading] = useState(true);
      const [showAdminLogin, setShowAdminLogin] = useState(false);
      const [adminPassword, setAdminPassword] = useState('');
      const [loginError, setLoginError] = useState('');

      useEffect(() => {
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (err) {
            console.error("Auth failed:", err);
          }
        };
        initAuth();
        return onAuthStateChanged(auth, (u) => {
          setUser(u);
          setLoading(false);
        });
      }, []);

      useEffect(() => {
        if (!user) return;
        const poemsRef = collection(db, 'poems');
        return onSnapshot(poemsRef, (snap) => {
          const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setPoems(data.sort((a, b) => (a.rank || 0) - (b.rank || 0)));
        });
      }, [user]);

      const handleAdminLogin = (e) => {
        e.preventDefault();
        if (adminPassword === 'kavi123') {
          setIsAdmin(true);
          setShowAdminLogin(false);
          setAdminPassword('');
          setView('admin');
        } else {
          setLoginError('Incorrect password');
        }
      };

      const Header = () => (
        <header className="bg-stone-900 text-stone-100 sticky top-0 z-20 p-4 shadow-lg">
          <div className="max-w-7xl mx-auto flex justify-between items-center">
            <div className="flex items-center gap-3 cursor-pointer" onClick={() => { setView('home'); setSelectedPoem(null); }}>
              <div className="bg-stone-800 p-2 rounded-xl">
                 <BookOpen className="text-amber-500 w-6 h-6" />
              </div>
              <h1 className="text-xl font-serif font-bold tracking-widest hidden sm:block uppercase">Meri Pasand - Meri Awaaz me</h1>
            </div>
            <div className="flex gap-4">
              {isAdmin ? (
                <button onClick={() => setView(view === 'admin' ? 'home' : 'admin')} className="bg-stone-800 px-5 py-2 rounded-full text-xs font-bold uppercase tracking-widest flex items-center gap-2 hover:bg-stone-700 transition shadow-inner">
                  {view === 'admin' ? <List className="w-4 h-4" /> : <Settings className="w-4 h-4" />}
                  {view === 'admin' ? 'Library' : 'Dashboard'}
                </button>
              ) : (
                <button onClick={() => setShowAdminLogin(true)} className="text-stone-400 hover:text-amber-500 transition flex items-center gap-2 text-xs font-bold uppercase tracking-widest">
                  <LogIn className="w-4 h-4" /> <span className="hidden sm:inline">Author Login</span>
                </button>
              )}
            </div>
          </div>
        </header>
      );

      const HomeView = () => {
        const [searchQuery, setSearchQuery] = useState('');
        const [selectedFilter, setSelectedFilter] = useState('All');

        const uniquePoets = useMemo(() => {
          const poetSet = new Set();
          poems.forEach(p => {
            const poetName = p.poet || p.poetHindi || 'Unknown';
            poetSet.add(poetName);
          });
          return ['All', ...Array.from(poetSet).sort()];
        }, [poems]);

        const filteredPoems = useMemo(() => {
          return poems.filter(p => {
            const poetName = p.poet || p.poetHindi || 'Unknown';
            const matchesPoet = selectedFilter === 'All' || poetName === selectedFilter;
            const q = searchQuery.toLowerCase();
            const matchesSearch = 
              (p.title || '').toLowerCase().includes(q) ||
              (p.titleHindi || '').toLowerCase().includes(q) ||
              (p.poet || '').toLowerCase().includes(q) ||
              (p.poetHindi || '').toLowerCase().includes(q) ||
              (p.hindiText || '').toLowerCase().includes(q) ||
              (p.romanText || '').toLowerCase().includes(q);

            return matchesPoet && matchesSearch;
          });
        }, [poems, searchQuery, selectedFilter]);

        return (
          <div className="max-w-7xl mx-auto p-4 md:p-8">
            <div className="text-center mb-10 mt-4 md:mt-8">
              <h2 className="text-4xl md:text-6xl font-serif font-black text-stone-800 mb-4 tracking-tight leading-tight">Meri Pasand <br className="md:hidden" /> <span className="text-amber-600">- Meri Awaaz Me</span></h2>
              <p className="text-stone-500 italic text-lg md:text-xl mb-8 max-w-2xl mx-auto">Explore a curated collection of beautiful Hindi and Urdu poetry, complete with transliterations, meanings, and audio recitations.</p>
            </div>

            <div className="bg-white p-4 md:p-6 rounded-[2rem] shadow-lg border border-stone-200 mb-10 sticky top-[76px] z-10">
               <div className="flex flex-col md:flex-row gap-4 items-center">
                  <div className="relative w-full md:w-1/2 lg:w-1/3 shrink-0">
                    <Search className="absolute left-4 top-1/2 transform -translate-y-1/2 text-stone-400 w-5 h-5" />
                    <input 
                      type="text" 
                      placeholder="Search by title, poet, or words in poem..." 
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      className="w-full bg-stone-50 border border-stone-200 py-3 pl-12 pr-4 rounded-full outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition text-stone-700 font-medium"
                    />
                    {searchQuery && (
                      <button onClick={() => setSearchQuery('')} className="absolute right-4 top-1/2 transform -translate-y-1/2 text-stone-400 hover:text-stone-600">
                        <X className="w-4 h-4" />
                      </button>
                    )}
                  </div>
                  <div className="w-full flex items-center gap-2 overflow-x-auto pb-2 md:pb-0 hide-scrollbar scroll-smooth">
                     <div className="flex items-center gap-2 px-2 border-r border-stone-200 mr-2 shrink-0">
                        <Filter className="w-4 h-4 text-stone-400" />
                        <span className="text-xs font-bold uppercase tracking-widest text-stone-400">Poet</span>
                     </div>
                     {uniquePoets.map(poet => (
                       <button
                         key={poet}
                         onClick={() => setSelectedFilter(poet)}
                         className={`shrink-0 px-5 py-2 rounded-full text-sm font-bold transition-all whitespace-nowrap ${
                           selectedFilter === poet 
                            ? 'bg-stone-800 text-white shadow-md transform scale-105' 
                            : 'bg-stone-100 text-stone-600 hover:bg-stone-200'
                         }`}
                       >
                         {poet}
                       </button>
                     ))}
                  </div>
               </div>
            </div>

            <div className="mb-6 flex justify-between items-end px-2">
                <h3 className="font-bold text-stone-500 uppercase tracking-widest text-xs">
                  {filteredPoems.length} {filteredPoems.length === 1 ? 'Composition Found' : 'Compositions Found'}
                </h3>
            </div>

            {filteredPoems.length === 0 ? (
              <div className="bg-white rounded-[2rem] border border-stone-200 p-16 text-center shadow-sm">
                 <div className="w-20 h-20 bg-stone-50 rounded-full flex items-center justify-center mx-auto mb-6">
                    <Search className="w-8 h-8 text-stone-300" />
                 </div>
                 <h3 className="text-2xl font-black text-stone-800 mb-2">No poems found</h3>
                 <p className="text-stone-500">Try adjusting your search or clearing the filters to find what you're looking for.</p>
                 {(searchQuery || selectedFilter !== 'All') && (
                   <button 
                     onClick={() => { setSearchQuery(''); setSelectedFilter('All'); }}
                     className="mt-6 px-6 py-2 bg-amber-100 text-amber-800 font-bold rounded-full hover:bg-amber-200 transition text-sm uppercase tracking-widest"
                   >
                     Clear Filters
                   </button>
                 )}
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                {filteredPoems.map(p => {
                  const isAudioOnly = p.mediaUrl && (p.mediaUrl.match(/\.(mp3|wav|m4a|aac|ogg|webm)(\?.*)?$/i) || p.mediaUrl.startsWith('data:audio'));
                  const avgRating = p.ratingCount ? (p.ratingSum / p.ratingCount).toFixed(1) : 0;
                  
                  return (
                    <div 
                      key={p.id} 
                      onClick={() => { setSelectedPoem(p); setView('detail'); }} 
                      className="bg-white p-8 rounded-[2rem] border border-stone-100 shadow-sm hover:shadow-2xl hover:border-amber-300 hover:-translate-y-1 transition-all duration-300 cursor-pointer group flex flex-col h-full relative overflow-hidden"
                    >
                      <div className="absolute top-0 right-0 w-32 h-32 bg-amber-50 rounded-bl-[100px] -mr-10 -mt-10 opacity-50 group-hover:bg-amber-100 transition-colors"></div>
                      
                      <div className="relative z-10 flex-grow">
                        <div className="flex justify-between items-start mb-1">
                            <h3 className="text-2xl font-serif font-bold text-stone-800 group-hover:text-amber-800 transition leading-snug pr-2">{p.title || p.titleHindi}</h3>
                            {avgRating > 0 && (
                                <div className="flex items-center gap-1 bg-amber-100 text-amber-800 px-2 py-1 rounded-md text-xs font-bold shrink-0">
                                    <Star className="w-3 h-3 fill-amber-500 text-amber-500" />
                                    {avgRating}
                                </div>
                            )}
                        </div>
                        {p.titleHindi && p.title && <p className="text-sm font-medium text-stone-400 mb-2">{p.titleHindi}</p>}
                        
                        <div className="inline-block mt-2 mb-6 px-3 py-1 bg-stone-50 rounded-lg border border-stone-100">
                          <p className="text-amber-700 font-bold text-xs uppercase tracking-wider">{p.poet || p.poetHindi}</p>
                        </div>
                        
                        <p className="text-stone-500 line-clamp-4 text-base italic leading-relaxed font-serif">
                          {p.hindiText ? p.hindiText.split('\n').filter(line => line.trim() !== '').slice(0,2).join('\n') : ''}...
                        </p>
                      </div>
                      
                      <div className="relative z-10 mt-8 flex items-center justify-between pt-6 border-t border-stone-100">
                        <span className="text-[10px] font-black uppercase tracking-[0.2em] text-stone-400 group-hover:text-amber-600 transition flex items-center gap-1">
                          Read Poem <ChevronLeft className="w-3 h-3 rotate-180 inline" />
                        </span>
                        {p.mediaUrl && (
                          <div className="flex items-center gap-1.5 text-amber-600 bg-amber-50/80 px-3 py-1.5 rounded-full border border-amber-100/50 group-hover:bg-amber-100 transition">
                              {isAudioOnly ? (
                                  <><Headphones className="w-3 h-3" /><span className="text-[10px] font-bold uppercase tracking-wider hidden sm:inline">Audio</span></>
                              ) : (
                                  <><Video className="w-3 h-3" /><span className="text-[10px] font-bold uppercase tracking-wider hidden sm:inline">Media</span></>
                              )}
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      };

      const PoemDetailView = () => {
        const [comments, setComments] = useState([]);
        const [newComment, setNewComment] = useState('');
        const [newRating, setNewRating] = useState(0);
        const [hoverRating, setHoverRating] = useState(0);
        const [submittingComment, setSubmittingComment] = useState(false);

        const currentPoem = poems.find(p => p.id === selectedPoem?.id) || selectedPoem;
        const avgRating = currentPoem?.ratingCount ? (currentPoem.ratingSum / currentPoem.ratingCount).toFixed(1) : 0;

        useEffect(() => {
          if (!user || !selectedPoem) return;
          const commentsRef = collection(db, `poems/${selectedPoem.id}/comments`);
          const unsubscribe = onSnapshot(commentsRef, (snap) => {
            const loaded = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            setComments(loaded.sort((a, b) => b.createdAt - a.createdAt));
          });
          return () => unsubscribe();
        }, [user, selectedPoem]);

        const handleAddComment = async (e) => {
          e.preventDefault();
          if (!user || (newRating === 0 && !newComment.trim())) return;
          
          setSubmittingComment(true);
          try {
            await addDoc(collection(db, `poems/${selectedPoem.id}/comments`), {
              userId: user.uid,
              text: newComment.trim(),
              rating: newRating,
              createdAt: Date.now()
            });

            if (newRating > 0) {
                const poemRef = doc(db, 'poems', selectedPoem.id);
                const currentCount = currentPoem.ratingCount || 0;
                const currentSum = currentPoem.ratingSum || 0;
                
                await updateDoc(poemRef, {
                    ratingCount: currentCount + 1,
                    ratingSum: currentSum + newRating
                });
            }

            setNewComment('');
            setNewRating(0);
          } catch (error) {
            console.error("Error adding comment/rating:", error);
          } finally {
            setSubmittingComment(false);
          }
        };

        if (!currentPoem) return null;
        return (
          <div className="max-w-5xl mx-auto p-6 animate-in fade-in slide-in-from-bottom-4 duration-700">
            <button onClick={() => setView('home')} className="flex items-center text-stone-400 mb-10 hover:text-amber-600 font-bold uppercase tracking-widest text-xs transition">
              <ChevronLeft className="w-4 h-4 mr-2" /> Back to Library
            </button>

            <div className="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-stone-100 mb-12">
              <div className="bg-stone-50 p-10 md:p-20 text-center border-b border-stone-100 relative">
                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-amber-200 via-amber-500 to-amber-200"></div>
                
                {avgRating > 0 && (
                    <div className="flex items-center justify-center gap-2 bg-amber-100 text-amber-800 px-4 py-1.5 rounded-full text-sm font-bold w-max mx-auto mb-6 shadow-sm border border-amber-200">
                        <Star className="w-4 h-4 fill-amber-500 text-amber-500" />
                        {avgRating} ({currentPoem.ratingCount} Reviews)
                    </div>
                )}

                <h2 className="text-5xl md:text-7xl font-serif font-bold text-stone-800 mb-4 leading-tight">{currentPoem.titleHindi || currentPoem.title}</h2>
                {currentPoem.titleHindi && currentPoem.title && (
                  <p className="text-2xl text-stone-400 mb-8 font-light tracking-widest uppercase">{currentPoem.title}</p>
                )}
                <p className="text-xl text-amber-700 font-serif italic mb-12">— {currentPoem.poetHindi || currentPoem.poet} —</p>
                
                {currentPoem.mediaUrl && (
                  <div className="w-full max-w-3xl mx-auto">
                    <MediaRenderer url={currentPoem.mediaUrl} />
                  </div>
                )}
              </div>
              <div className="grid md:grid-cols-2 divide-y md:divide-y-0 md:divide-x divide-stone-100">
                <div className="p-10 md:p-20">
                  <h4 className="text-[10px] font-black uppercase text-amber-600 mb-10 tracking-[0.3em] border-b border-amber-100 pb-2 w-max">Hindi Text</h4>
                  <div className="font-serif text-2xl md:text-3xl leading-[1.8] whitespace-pre-wrap text-stone-800">{currentPoem.hindiText}</div>
                </div>
                <div className="p-10 md:p-20 bg-stone-50/30">
                  <h4 className="text-[10px] font-black uppercase text-stone-400 mb-10 tracking-[0.3em] border-b border-stone-100 pb-2 w-max">Transliteration</h4>
                  <div className="font-serif text-2xl md:text-3xl leading-[1.8] whitespace-pre-wrap italic text-stone-500">{currentPoem.romanText}</div>
                </div>
              </div>
            </div>

            {currentPoem.vocabulary && (
              <div className="bg-amber-50/40 p-12 rounded-[2rem] border border-amber-100 max-w-4xl mx-auto shadow-sm mb-12">
                <h4 className="font-bold text-amber-900 text-2xl mb-8 flex items-center gap-4"><BookOpen className="w-8 h-8 text-amber-600" /> Glossary (Word Meanings)</h4>
                <div className="whitespace-pre-wrap leading-[2] text-stone-700 text-xl font-serif italic">{currentPoem.vocabulary}</div>
              </div>
            )}

            <div className="max-w-4xl mx-auto bg-white rounded-[2.5rem] shadow-lg border border-stone-200 overflow-hidden">
                <div className="p-10 md:p-12 border-b border-stone-100 bg-stone-50">
                   <h3 className="text-3xl font-black text-stone-800 mb-2 flex items-center gap-3"><MessageSquare className="w-8 h-8 text-amber-500" /> Reader Reflections</h3>
                   <p className="text-stone-500 font-medium">Leave a rating or share your thoughts about this composition.</p>
                </div>

                <div className="p-10 md:p-12">
                   <form onSubmit={handleAddComment} className="mb-12 bg-stone-50 rounded-2xl p-6 md:p-8 border border-stone-200">
                      <div className="mb-6 flex flex-col md:flex-row md:items-center gap-4 border-b border-stone-200 pb-6">
                         <span className="font-bold text-stone-600 uppercase tracking-widest text-xs">Your Rating</span>
                         <div className="flex gap-1">
                            {[1, 2, 3, 4, 5].map((star) => (
                               <Star 
                                  key={star}
                                  className={`w-8 h-8 cursor-pointer transition-transform hover:scale-110 ${star <= (hoverRating || newRating) ? 'fill-amber-500 text-amber-500' : 'text-stone-300'}`}
                                  onMouseEnter={() => setHoverRating(star)}
                                  onMouseLeave={() => setHoverRating(0)}
                                  onClick={() => setNewRating(star)}
                               />
                            ))}
                         </div>
                      </div>
                      
                      <textarea
                        value={newComment}
                        onChange={(e) => setNewComment(e.target.value)}
                        placeholder="Write your review or reflection here..."
                        className="w-full bg-white border border-stone-200 rounded-xl p-4 md:p-6 text-lg focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none transition min-h-[120px] mb-4"
                      />
                      
                      <div className="flex justify-end">
                         <button 
                            type="submit"
                            disabled={submittingComment || (newRating === 0 && !newComment.trim())}
                            className="bg-stone-900 text-white px-8 py-3 rounded-full font-bold uppercase tracking-widest text-xs hover:bg-stone-800 transition shadow-lg disabled:opacity-50 disabled:shadow-none"
                         >
                            {submittingComment ? 'Posting...' : 'Post Reflection'}
                         </button>
                      </div>
                   </form>

                   <div className="space-y-6">
                      {comments.length === 0 ? (
                         <div className="text-center py-10 px-4">
                            <Star className="w-12 h-12 text-stone-200 mx-auto mb-4" />
                            <p className="text-stone-400 font-bold uppercase tracking-widest text-sm">No reviews yet.</p>
                            <p className="text-stone-400 mt-2 text-sm">Be the first to share your thoughts!</p>
                         </div>
                      ) : (
                         comments.map(c => (
                            <div key={c.id} className="bg-white p-6 md:p-8 rounded-2xl border border-stone-100 shadow-sm hover:shadow-md transition">
                               <div className="flex justify-between items-start mb-4">
                                  <div>
                                     <p className="font-black text-stone-800 text-sm">Reader • {c.userId.substring(0,6)}</p>
                                     <p className="text-xs text-stone-400 mt-1 uppercase tracking-wider">{new Date(c.createdAt).toLocaleDateString()}</p>
                                  </div>
                                  {c.rating > 0 && (
                                     <div className="flex gap-1">
                                        {[...Array(5)].map((_, i) => (
                                           <Star key={i} className={`w-4 h-4 ${i < c.rating ? 'fill-amber-500 text-amber-500' : 'text-stone-200'}`} />
                                        ))}
                                     </div>
                                  )}
                               </div>
                               {c.text && <p className="text-stone-600 text-lg leading-relaxed">{c.text}</p>}
                            </div>
                         ))
                      )}
                   </div>
                </div>
            </div>
          </div>
        );
      };

      const AdminDashboard = () => {
        const [editingPoem, setEditingPoem] = useState(null);
        const [formData, setFormData] = useState({ title: '', titleHindi: '', poet: '', poetHindi: '', hindiText: '', romanText: '', vocabulary: '', mediaUrl: '', rank: 0, mediaType: 'none' });
        const [isSaving, setIsSaving] = useState(false);
        const [uploading, setUploading] = useState(false);
        const [progress, setProgress] = useState(0);
        const [isRecording, setIsRecording] = useState(false);
        const [showLinkInput, setShowLinkInput] = useState(false);
        const [formError, setFormError] = useState('');
        const [aiProcessing, setAiProcessing] = useState(false);
        const [audioData, setAudioData] = useState(null);
        
        const mediaRecorder = useRef(null);
        const typingTimeout = useRef(null);
        const titleTimeoutRef = useRef(null);
        const poetTimeoutRef = useRef(null);

        const handleCreateNew = () => {
          setEditingPoem({ id: 'new' });
          setFormData({ title: '', titleHindi: '', poet: '', poetHindi: '', hindiText: '', romanText: '', vocabulary: '', mediaUrl: '', rank: poems.length + 1, mediaType: 'none' });
          setFormError('');
          setAudioData(null);
          setShowLinkInput(false);
        };

        const handleEdit = (p) => {
          setEditingPoem(p);
          setFormData({ ...p });
          setFormError('');
          setAudioData(null); 
          setShowLinkInput(!!(p.mediaUrl && !p.mediaUrl.startsWith('https://firebasestorage')));
        };

        const blobToBase64 = (blob) => new Promise(resolve => {
          const r = new FileReader(); r.onloadend = () => resolve(r.result); r.readAsDataURL(blob);
        });

        const handleFile = async (e) => {
          const file = e.target.files[0];
          if (!file || !user) return;

          setUploading(true);
          setFormError('');
          setShowLinkInput(false);

          const b64 = await blobToBase64(file);
          setAudioData({ base64: b64, mimeType: file.type });

          if (storage) {
            const fileName = `${Date.now()}_${file.name.replace(/\s+/g, '_')}`;
            const path = `poetry_media/${fileName}`;
            const sRef = ref(storage, path);
            const task = uploadBytesResumable(sRef, file);
            
            task.on('state_changed', 
              (s) => setProgress(Math.round((s.bytesTransferred / s.totalBytes) * 100)),
              (err) => { 
                console.error("Storage Error:", err);
                setFormError(`Upload failed: ${err.message}`); 
                setUploading(false); 
              },
              async () => {
                const url = await getDownloadURL(task.snapshot.ref);
                setFormData(prev => ({ ...prev, mediaUrl: url, mediaType: 'audio' }));
                setUploading(false);
                setProgress(0);
              }
            );
          } else {
            setFormError("Storage could not be initialized. Check your config.");
            setUploading(false);
          }
        };

        const startRecording = async () => {
          try {
            setShowLinkInput(false);
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder.current = new MediaRecorder(stream);
            const chunks = [];
            mediaRecorder.current.ondataavailable = (e) => chunks.push(e.data);
            mediaRecorder.current.onstop = async () => {
              const blob = new Blob(chunks, { type: 'audio/webm' });
              const b64 = await blobToBase64(blob);
              setAudioData({ base64: b64, mimeType: 'audio/webm' });
              
              if (storage && user) {
                setUploading(true);
                const path = `poetry_media/rec_${Date.now()}.webm`;
                const sRef = ref(storage, path);
                const task = uploadBytesResumable(sRef, blob);
                task.on('state_changed', 
                  (s) => setProgress(Math.round((s.bytesTransferred / s.totalBytes) * 100)), 
                  (err) => { setFormError(err.message); setUploading(false); },
                  async () => {
                    const url = await getDownloadURL(task.snapshot.ref);
                    setFormData(p => ({ ...p, mediaUrl: url, mediaType: 'audio' }));
                    setUploading(false);
                  }
                );
              }
            };
            mediaRecorder.current.start();
            setIsRecording(true);
          } catch(e) { alert("Mic error: " + e.message); }
        };

        const stopRecording = () => {
          if (mediaRecorder.current) {
            mediaRecorder.current.stop();
            setIsRecording(false);
          }
        };

        const handleTranscribe = async () => {
          if (!audioData) {
             setFormError("AI Transcription currently works only for 'Recorded' or 'Uploaded' files. External links (like YouTube or Facebook) cannot be directly processed by the browser due to platform security restrictions. Please upload the raw file for AI transcription.");
             return;
          }
          setFormError('');
          setAiProcessing(true);
          const text = await transcribeAudio(audioData.base64, audioData.mimeType);
          if (text) {
            setFormData(p => ({ ...p, hindiText: text }));
            const roman = await transliterateText(text, 'roman');
            const vocab = await extractUrduVocabulary(text);
            setFormData(prev => ({ ...prev, romanText: roman, vocabulary: vocab }));
          } else {
            setFormError("Could not hear speech clearly. Please try again.");
          }
          setAiProcessing(false);
        };

        const autoSync = async (text, field) => {
          if (!text.trim()) return;
          setAiProcessing(true);
          if (field === 'hindi') {
            const res = await transliterateText(text, 'roman');
            const vocab = await extractUrduVocabulary(text);
            setFormData(p => ({ ...p, romanText: res, vocabulary: vocab }));
          } else if (field === 'roman') {
            const res = await transliterateText(text, 'hindi');
            setFormData(p => ({ ...p, hindiText: res }));
          }
          setAiProcessing(false);
        };

        const handleTextChange = (e, field) => {
          const val = e.target.value;
          setFormData(p => ({ ...p, [`${field}Text`]: val }));
          if (typingTimeout.current) clearTimeout(typingTimeout.current);
          typingTimeout.current = setTimeout(() => autoSync(val, field), 2500);
        };

        const handleTitleChange = (e, sourceLang) => {
          const val = e.target.value;
          const isHindi = sourceLang === 'hindi';
          setFormData(p => ({ ...p, [isHindi ? 'titleHindi' : 'title']: val }));
          
          if (titleTimeoutRef.current) clearTimeout(titleTimeoutRef.current);
          titleTimeoutRef.current = setTimeout(async () => {
            if (!val.trim()) return;
            setAiProcessing(true);
            const targetLang = isHindi ? 'roman' : 'hindi';
            const res = await transliterateText(val, targetLang);
            if (res) setFormData(p => ({ ...p, [isHindi ? 'title' : 'titleHindi']: res }));
            setAiProcessing(false);
          }, 1500);
        };

        const handlePoetChange = (e, sourceLang) => {
          const val = e.target.value;
          const isHindi = sourceLang === 'hindi';
          setFormData(p => ({ ...p, [isHindi ? 'poetHindi' : 'poet']: val }));
          
          if (poetTimeoutRef.current) clearTimeout(poetTimeoutRef.current);
          poetTimeoutRef.current = setTimeout(async () => {
            if (!val.trim()) return;
            setAiProcessing(true);
            const targetLang = isHindi ? 'roman' : 'hindi';
            const res = await transliterateText(val, targetLang);
            if (res) setFormData(p => ({ ...p, [isHindi ? 'poet' : 'poetHindi']: res }));
            setAiProcessing(false);
          }, 1500);
        };

        const savePoem = async (e) => {
          e.preventDefault();
          if (!user) return;
          setIsSaving(true);
          try {
            const collectionPath = 'poems';
            const colRef = collection(db, collectionPath);
            const data = { ...formData, rank: Number(formData.rank), updatedAt: Date.now() };
            if (editingPoem.id === 'new') {
              data.createdAt = Date.now();
              await addDoc(colRef, data);
            } else {
              await updateDoc(doc(colRef, editingPoem.id), data);
            }
            setEditingPoem(null);
          } catch(e) { setFormError("Save error: " + e.message); } finally { setIsSaving(false); }
        };

        return (
          <div className="max-w-7xl mx-auto p-4 md:p-8">
            <div className={`mb-8 p-4 rounded-2xl flex items-center justify-between border shadow-sm ${user ? 'bg-green-50 text-green-700 border-green-100' : 'bg-red-50 text-red-700 border-red-100'}`}>
              <div className="flex items-center gap-3 text-sm font-black tracking-widest uppercase">
                {user ? <CheckCircle className="w-5 h-5" /> : <AlertCircle className="w-5 h-5" />}
                {user ? `Database Connected: ${user.uid.substring(0,8)}` : 'Waiting for Authentication...'}
              </div>
            </div>

            <div className="flex flex-col md:flex-row md:justify-between md:items-center gap-6 mb-10">
              <h2 className="text-4xl font-serif font-black text-stone-800">Library Dashboard</h2>
              {!editingPoem && <button onClick={handleCreateNew} className="bg-amber-600 text-white px-8 py-4 rounded-full font-bold shadow-xl hover:bg-amber-700 hover:-translate-y-1 transition-all flex items-center gap-2 uppercase tracking-widest text-xs w-full md:w-auto justify-center"><Plus className="w-4 h-4" /> Add New Composition</button>}
            </div>

            {editingPoem ? (
              <div className="bg-white p-6 md:p-12 rounded-[2.5rem] border border-stone-200 shadow-2xl animate-in zoom-in-95 duration-300">
                <div className="flex justify-between items-center mb-12 pb-6 border-b border-stone-100">
                  <h3 className="font-black text-2xl md:text-3xl text-stone-800">{editingPoem.id === 'new' ? 'New Composition' : 'Edit Composition'}</h3>
                  <button onClick={() => setEditingPoem(null)} className="p-3 bg-stone-100 rounded-full hover:bg-stone-200 transition"><X className="w-6 h-6 text-stone-500" /></button>
                </div>
                
                {formError && (
                  <div className="bg-red-50 text-red-700 p-6 rounded-2xl mb-10 border border-red-200 shadow-sm">
                    <div className="flex items-center gap-2 font-black mb-3 uppercase tracking-widest text-xs">
                        <AlertCircle className="w-4 h-4" />
                        <span>Notice</span>
                    </div>
                    <p className="text-sm font-medium leading-relaxed mb-4">{formError}</p>
                  </div>
                )}
                
                <form onSubmit={savePoem} className="space-y-12">
                  <div className="grid md:grid-cols-2 gap-8">
                    <div className="space-y-3">
                      <label className="text-[10px] font-black uppercase text-amber-600 tracking-widest ml-1">Title (Hindi)</label>
                      <input placeholder="शब्द..." value={formData.titleHindi} onChange={e => handleTitleChange(e, 'hindi')} className="w-full border-b-2 border-stone-200 p-4 outline-none focus:border-amber-500 transition bg-stone-50/50 rounded-t-xl text-xl font-serif" />
                    </div>
                    <div className="space-y-3">
                      <label className="text-[10px] font-black uppercase text-stone-400 tracking-widest ml-1">Title (Roman/English)</label>
                      <input placeholder="Shabd..." value={formData.title} onChange={e => handleTitleChange(e, 'roman')} className="w-full border-b-2 border-stone-200 p-4 outline-none focus:border-amber-500 transition bg-stone-50/50 rounded-t-xl text-xl" />
                    </div>
                    <div className="space-y-3">
                      <label className="text-[10px] font-black uppercase text-amber-600 tracking-widest ml-1">Poet (Hindi)</label>
                      <input placeholder="कवि..." value={formData.poetHindi} onChange={e => handlePoetChange(e, 'hindi')} className="w-full border-b-2 border-stone-200 p-4 outline-none focus:border-amber-500 transition bg-stone-50/50 rounded-t-xl font-serif" />
                    </div>
                    <div className="space-y-3">
                      <label className="text-[10px] font-black uppercase text-stone-400 tracking-widest ml-1">Poet (Roman/English)</label>
                      <input placeholder="Kavi..." value={formData.poet} onChange={e => handlePoetChange(e, 'roman')} className="w-full border-b-2 border-stone-200 p-4 outline-none focus:border-amber-500 transition bg-stone-50/50 rounded-t-xl" />
                    </div>
                    <div className="space-y-3 md:col-span-2">
                      <label className="text-[10px] font-black uppercase text-stone-400 tracking-widest ml-1">Sort Rank</label>
                      <input type="number" value={formData.rank} onChange={e => setFormData({...formData, rank: e.target.value})} className="w-full border-b-2 border-stone-200 p-4 outline-none focus:border-amber-500 transition bg-stone-50/50 rounded-t-xl text-xl" />
                    </div>
                  </div>

                  <div className="bg-stone-50 p-6 md:p-10 rounded-[2rem] border border-stone-200">
                    <label className="block text-[10px] font-black uppercase text-stone-500 mb-8 tracking-widest">Audio & Media</label>
                    <div className="flex flex-wrap gap-4 mb-10">
                      <button type="button" onClick={isRecording ? stopRecording : startRecording} className={`flex items-center gap-3 px-6 py-4 rounded-full font-black shadow-md transition duration-500 uppercase tracking-widest text-[10px] ${isRecording ? 'bg-red-600 text-white animate-pulse' : 'bg-stone-900 text-white hover:bg-stone-800'}`}>
                        {isRecording ? <StopCircle className="w-4 h-4" /> : <Mic className="w-4 h-4" />} {isRecording ? 'Stop Recording' : 'Record Live'}
                      </button>
                      <label className="flex items-center gap-3 px-6 py-4 bg-white border border-stone-200 rounded-full cursor-pointer hover:border-amber-400 transition-all shadow-sm font-black text-stone-600 uppercase tracking-widest text-[10px]">
                        <Upload className="w-4 h-4" /> Upload File
                        <input type="file" accept="audio/*" onChange={handleFile} className="hidden" />
                      </label>
                      <button type="button" onClick={() => setShowLinkInput(!showLinkInput)} className={`flex items-center gap-3 px-6 py-4 border rounded-full cursor-pointer transition-all shadow-sm font-black uppercase tracking-widest text-[10px] ${showLinkInput ? 'bg-amber-50 border-amber-300 text-amber-700' : 'bg-white border-stone-200 text-stone-600 hover:border-amber-400'}`}>
                        <LinkIcon className="w-4 h-4" /> Paste Link
                      </button>
                    </div>
                    
                    {showLinkInput && (
                        <div className="mb-10 animate-in slide-in-from-top-4 duration-300 bg-white p-6 rounded-2xl border border-stone-200 shadow-sm">
                            <label className="text-[10px] font-black uppercase text-stone-400 tracking-widest ml-1 mb-4 block">External Media Link (YouTube, Facebook, etc.)</label>
                            <div className="flex gap-4">
                               <input 
                                   type="url" 
                                   placeholder="https://..." 
                                   value={formData.mediaUrl}
                                   onChange={(e) => {
                                       setFormData(prev => ({ ...prev, mediaUrl: e.target.value, mediaType: 'external' }));
                                       setAudioData(null); 
                                   }}
                                   className="w-full border-b-2 border-stone-200 py-3 outline-none focus:border-amber-500 transition text-lg bg-transparent" 
                               />
                            </div>
                            <p className="text-[10px] text-stone-400 mt-4 uppercase tracking-widest flex items-center gap-2">
                               <Info className="w-3 h-3" /> Note: External links cannot be used for automatic AI transcription.
                            </p>
                        </div>
                    )}

                    {uploading && (
                        <div className="mb-8">
                            <div className="flex justify-between text-[10px] font-black text-amber-600 mb-3 uppercase tracking-[0.2em]">
                                <span>Uploading to Library...</span>
                                <span>{progress}%</span>
                            </div>
                            <div className="h-1.5 bg-stone-200 rounded-full overflow-hidden">
                                <div className="h-full bg-amber-500 transition-all duration-300" style={{width: `${progress}%`}}></div>
                            </div>
                        </div>
                    )}
                    
                    {formData.mediaUrl && (
                      <div className="flex flex-col gap-8 bg-white p-6 md:p-8 rounded-[1.5rem] shadow-inner border border-stone-100">
                        <MediaRenderer url={formData.mediaUrl} />
                        <div className="flex flex-col sm:flex-row items-center justify-between gap-4 pt-6 border-t border-stone-100">
                            <button type="button" onClick={handleTranscribe} disabled={aiProcessing || !audioData} className="bg-amber-100 text-amber-900 px-6 py-3 rounded-full flex items-center justify-center gap-3 w-full sm:w-max text-[10px] font-black shadow-sm hover:bg-amber-200 transition uppercase tracking-widest disabled:opacity-50">
                            {aiProcessing ? <Loader2 className="w-4 h-4 animate-spin" /> : <Wand2 className="w-4 h-4" />} AI Transcribe
                            </button>
                            <button type="button" onClick={() => { setFormData(p => ({...p, mediaUrl: ''})); setAudioData(null); }} className="text-red-500 hover:text-red-700 text-xs font-bold flex items-center gap-2 px-4 py-2 hover:bg-red-50 rounded-full transition">
                              <Trash2 className="w-4 h-4" /> Remove Media
                            </button>
                        </div>
                      </div>
                    )}
                  </div>

                  <div className="grid md:grid-cols-2 gap-10 relative">
                    {aiProcessing && <div className="absolute inset-0 bg-white/80 z-20 flex flex-col items-center justify-center backdrop-blur-sm rounded-[2rem] gap-4"><Loader2 className="animate-spin w-12 h-12 text-amber-600" /><span className="text-xs font-black tracking-widest uppercase text-amber-600">AI is thinking...</span></div>}
                    <div className="space-y-3">
                      <label className="text-[10px] font-black uppercase text-amber-600 tracking-widest ml-1">Hindi Text (Auto-Syncs)</label>
                      <textarea placeholder="Write here..." rows="12" value={formData.hindiText} onChange={e => handleTextChange(e, 'hindi')} className="w-full border p-6 rounded-[1.5rem] font-serif text-xl md:text-2xl border-stone-200 focus:ring-2 focus:ring-amber-500 outline-none shadow-sm leading-loose" />
                    </div>
                    <div className="space-y-3">
                      <label className="text-[10px] font-black uppercase text-stone-400 tracking-widest ml-1">Transliteration (Roman)</label>
                      <textarea placeholder="Auto-generated..." rows="12" value={formData.romanText} onChange={e => handleTextChange(e, 'roman')} className="w-full border p-6 rounded-[1.5rem] font-serif text-xl md:text-2xl italic bg-stone-50/50 border-stone-200 focus:ring-2 focus:ring-stone-400 outline-none shadow-sm leading-loose text-stone-600" />
                    </div>
                  </div>

                  <div className="space-y-3">
                    <label className="text-[10px] font-black uppercase text-stone-400 tracking-widest ml-1">Urdu Vocabulary (AI Meanings)</label>
                    <textarea placeholder="Words will be extracted automatically here..." rows="4" value={formData.vocabulary} onChange={e => setFormData({...formData, vocabulary: e.target.value})} className="w-full border p-6 rounded-[1.5rem] border-stone-200 focus:ring-2 focus:ring-stone-400 outline-none shadow-sm font-serif leading-relaxed" />
                  </div>

                  <div className="pt-8 border-t border-stone-100">
                      <button disabled={isSaving || uploading} className="w-full bg-stone-900 text-white py-6 rounded-[1.5rem] font-black text-xl hover:bg-stone-800 transition-all disabled:opacity-50 shadow-2xl uppercase tracking-[0.2em] hover:-translate-y-1">
                        {isSaving ? 'Saving Composition...' : 'Publish Composition'}
                      </button>
                  </div>
                </form>
              </div>
            ) : (
              <div className="bg-white rounded-[2.5rem] border border-stone-200 overflow-hidden shadow-xl">
                <div className="p-6 md:p-8 flex items-center justify-between border-b border-stone-100 bg-stone-50/50">
                   <h3 className="font-bold text-stone-500 uppercase tracking-widest text-xs">{poems.length} Compositions total</h3>
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full text-left border-collapse min-w-[800px]">
                    <thead>
                      <tr className="bg-white border-b border-stone-100">
                        <th className="p-6 font-black uppercase text-[10px] text-stone-400 tracking-widest">Rank</th>
                        <th className="p-6 font-black uppercase text-[10px] text-stone-400 tracking-widest">Composition</th>
                        <th className="p-6 font-black uppercase text-[10px] text-stone-400 tracking-widest">Media</th>
                        <th className="p-6 font-black uppercase text-[10px] text-stone-400 tracking-widest text-right">Actions</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-stone-50">
                      {poems.length === 0 ? (
                        <tr><td colSpan="4" className="p-32 text-center text-stone-300 italic font-serif text-2xl">No poems found. Let's get started!</td></tr>
                      ) : poems.map(p => (
                        <tr key={p.id} className="hover:bg-stone-50/50 transition cursor-default group">
                          <td className="p-6 font-black text-stone-300 group-hover:text-stone-500 transition w-20">{p.rank}</td>
                          <td className="p-6">
                             <div className="font-serif font-bold text-xl text-stone-800 mb-1">{p.titleHindi || p.title}</div>
                             <div className="text-[10px] font-black text-stone-400 uppercase tracking-widest">{p.poetHindi || p.poet}</div>
                          </td>
                          <td className="p-6">
                            {p.mediaUrl ? (
                               <div className="flex items-center gap-2 text-amber-600 bg-amber-50 px-3 py-1 rounded-full w-max">
                                  {p.mediaUrl.match(/\.(mp3|wav|m4a|aac|ogg|webm)(\?.*)?$/i) || p.mediaUrl.startsWith('data:audio') ? (
                                      <><Headphones className="w-3 h-3" /><span className="text-[10px] font-bold uppercase tracking-wider">Audio</span></>
                                  ) : (
                                      <><Video className="w-3 h-3" /><span className="text-[10px] font-bold uppercase tracking-wider">Media</span></>
                                  )}
                               </div>
                            ) : <span className="text-[10px] font-bold text-stone-300 uppercase tracking-widest px-3 py-1 bg-stone-50 rounded-full">None</span>}
                          </td>
                          <td className="p-6 text-right">
                            <div className="flex justify-end gap-3 opacity-50 group-hover:opacity-100 transition-opacity">
                              <button onClick={() => handleEdit(p)} className="p-3 text-stone-500 hover:text-amber-600 hover:bg-amber-50 rounded-full transition shadow-sm bg-white border border-stone-100"><Edit className="w-4 h-4" /></button>
                              <button onClick={() => { if(window.confirm(`Are you sure you want to delete "${p.titleHindi || p.title}"?`)) deleteDoc(doc(db, 'poems', p.id)); }} className="p-3 text-stone-500 hover:text-red-600 hover:bg-red-50 rounded-full transition shadow-sm bg-white border border-stone-100"><Trash2 className="w-4 h-4" /></button>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        );
      };

      if (loading) return (
        <div className="h-screen flex flex-col items-center justify-center bg-stone-50 gap-10">
          <div className="relative">
            <div className="w-24 h-24 border-4 border-stone-200 border-t-amber-500 rounded-full animate-spin"></div>
            <BookOpen className="absolute inset-0 m-auto w-8 h-8 text-stone-800" />
          </div>
          <p className="font-serif italic text-stone-400 text-xl animate-pulse">Loading library...</p>
        </div>
      );

      return (
        <div className="min-h-screen bg-stone-50 text-stone-900 font-sans selection:bg-amber-200">
          <Header />
          <main className="min-h-[calc(100vh-73px)] pb-32">
            {view === 'home' && <HomeView />}
            {view === 'detail' && <PoemDetailView />}
            {view === 'admin' && isAdmin && <AdminDashboard />}
          </main>
          
          {showAdminLogin && (
            <div className="fixed inset-0 bg-stone-900/80 backdrop-blur-xl flex items-center justify-center p-6 z-50 animate-in fade-in duration-500">
              <div className="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md border border-stone-100">
                <h2 className="text-4xl font-black mb-2 text-stone-800 tracking-tight uppercase">Author Login</h2>
                <p className="text-stone-400 mb-12 text-sm font-bold uppercase tracking-widest">Authentication Required</p>
                <form onSubmit={handleAdminLogin} className="space-y-6">
                  <input type="password" value={adminPassword} onChange={e => setAdminPassword(e.target.value)} placeholder="Secret Key" className="w-full border-b-4 border-stone-100 p-6 outline-none focus:border-amber-500 text-2xl font-bold transition" autoFocus />
                  {loginError && <p className="text-red-500 text-xs font-black uppercase tracking-widest">{loginError}</p>}
                  <button className="w-full bg-stone-900 text-white py-6 rounded-[1.5rem] font-black text-xl hover:bg-black transition shadow-2xl uppercase tracking-widest">Enter</button>
                </form>
                <button onClick={() => setShowAdminLogin(false)} className="w-full mt-10 text-stone-300 text-xs font-black uppercase tracking-widest hover:text-stone-500 transition">Cancel</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
